# Job serverless que executa o entrypoint do pacote.
# Paths são relativos a este arquivo. Teste: databricks bundle run -t dev nome_pacote_job
resources:
  jobs:
    nome_pacote_job:
      name: nome_pacote_job
      tasks:
        - task_key: principal
          spark_python_task:
            python_file: ../src/nome_pacote/main.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2"
      # Em dev (mode: development) o schedule fica pausado automaticamente.
      # schedule:
      #   quartz_cron_expression: "0 0 6 * * ?"
      #   timezone_id: America/Sao_Paulo
